name: Rust CI

on:
  push:
    branches:
      - "**"
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all --check

      - name: Cargo check
        run: cargo check --all-targets

      - name: Release build
        run: cargo build --release

      - name: Create ZIP artifact
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/release/vene_clicker.exe dist/vene_clicker.exe -Force
          Compress-Archive -Path dist/vene_clicker.exe -DestinationPath vene_clicker-windows.zip -Force

      - name: Upload ZIP artifact
        uses: actions/upload-artifact@v4
        with:
          name: vene_clicker-windows
          path: vene_clicker-windows.zip
